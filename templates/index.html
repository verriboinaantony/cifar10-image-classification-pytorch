<!doctype html>
<html>
  <head>
    <title>Image Classifier</title>
  </head>
  <body>
    <h2>Upload Image</h2>

    <form method="POST" enctype="multipart/form-data">
      <input type="file" name="file" required />
      <button type="submit">Predict</button>
    </form>

    {% if prediction %}
    <h3>Prediction: {{ prediction }}</h3>
    {% endif %}
  </body>
</html>
